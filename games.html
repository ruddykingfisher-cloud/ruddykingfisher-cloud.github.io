<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Ruddy Crown Games</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#111;
    color:#eee;
    margin:0;
    text-align:center;
}

/* 上部ヘッダー */
header{
    background:#1b1b1b;
    padding:20px;
}

/* タイトルリンク */
header a{
    color:white;
    text-decoration:none;
    font-size:28px;
    font-weight:bold;
}

header a:hover{
    color:#CD4187;
}

.games{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:30px;
    padding:30px;
}

.game{
    background:#1b1b1b;
    padding:20px;
    border-radius:10px;
    width:220px;
}

.game img{
    width:100%;
    border-radius:6px;
}

.game h2{
    font-size:18px;
}

.store-link{
    display:inline-block;
    margin-top:10px;
    padding:10px 15px;
    background:#2d2d2d;
    color:white;
    text-decoration:none;
    border-radius:6px;
}

.store-link:hover{
    background:#444;
}
</style>

</head>

<body>

<header>
<a href="index.html">Ruddy Crown</a>
</header>

<div class="games">

<div class="game">
<img src="dungeonLove.png" alt="ダンジョン攻略は恋のはじまり">
<h2>ダンジョン攻略は恋のはじまり</h2>
<a class="store-link" href="https://apps.apple.com/app/idXXXXXXXX" target="_blank">
App Store
</a>
</div>

</div>

</body>
</html>
